<style>
:root{
  --bg:#14171c;--bg-elev:#1b1f26;--bg-elev-2:#232831;
  --border:rgba(255,255,255,0.08);--border-soft:rgba(255,255,255,0.05);
  --text:#eef0f3;--text-dim:#9aa2af;--text-faint:#5d6471;
  --accent:#d8a64e;--accent-dim:#8a6f3c;--accent-bg:rgba(216,166,78,0.12);
  --danger:#d9685f;--danger-bg:rgba(217,104,95,0.12);--good:#6db58a;
  --radius:14px;--radius-sm:9px;
  --serif:"Iowan Old Style","Palatino Linotype",Georgia,serif;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Tahoma,sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;}
body{padding-bottom:90px;}
::selection{background:var(--accent-bg);}
input,button,textarea,select{font-family:inherit;color:inherit;}
.screen{display:none;padding:0 0 24px;}
.screen.active{display:block;}
#login-screen,#register-screen,#recovery-screen{min-height:100vh;position:relative;overflow:hidden;display:flex;flex-direction:column;align-items:center;}
.vault-bg{position:absolute;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse 600px 400px at 50% -10%,rgba(216,166,78,0.08),transparent 60%),repeating-linear-gradient(135deg,rgba(255,255,255,0.012) 0px,rgba(255,255,255,0.012) 1px,transparent 1px,transparent 26px);}
.lock-content{position:relative;z-index:1;width:100%;display:flex;flex-direction:column;align-items:center;padding:44px 24px 32px;text-align:center;flex:1;}
.dial{position:relative;width:96px;height:96px;margin-bottom:22px;flex:0 0 auto;}
.dial-sm{width:72px;height:72px;margin-bottom:16px;}
.dial-ring{width:100%;height:100%;position:absolute;inset:0;}
.dial-ring-track{fill:none;stroke:var(--border);stroke-width:1.5;}
.dial-ticks line{stroke:var(--accent-dim);stroke-width:2;stroke-linecap:round;opacity:0.55;}
.dial-center{position:absolute;inset:14px;border-radius:50%;background:linear-gradient(155deg,var(--bg-elev-2),var(--bg-elev));border:1px solid var(--border);display:flex;align-items:center;justify-content:center;box-shadow:inset 0 1px 0 rgba(255,255,255,0.04),0 6px 18px rgba(0,0,0,0.3);}
.dial-sm .dial-center{inset:10px;}
.dial-center .ticon{font-size:30px;color:var(--accent);}
.dial-sm .dial-center .ticon{font-size:22px;}
@keyframes dial-settle{0%{transform:rotate(-14deg);}100%{transform:rotate(0deg);}}
.dial-ticks{transform-origin:60px 60px;animation:dial-settle .9s cubic-bezier(.16,.84,.32,1);}
.lock-title{font-family:var(--serif);font-size:26px;font-weight:400;margin:0 0 8px;letter-spacing:.3px;}
.lock-sub{font-size:13px;color:var(--text-dim);margin:0 0 24px;line-height:1.75;max-width:300px;}
.lock-form{width:100%;max-width:320px;display:flex;flex-direction:column;gap:12px;}
.field-block{text-align:right;display:flex;flex-direction:column;gap:5px;}
.field-block-label{font-size:12px;color:var(--text-dim);font-weight:500;padding:0 2px;}
.pw-field{position:relative;}
.pw-field input,.plain-input{width:100%;background:var(--bg-elev);border:1px solid var(--border);border-radius:var(--radius-sm);padding:13px 42px 13px 14px;font-size:15px;color:var(--text);text-align:right;outline:none;transition:border-color .15s,background .15s;}
.plain-input{padding:13px 14px;}
.pw-field input:focus,.plain-input:focus{border-color:var(--accent-dim);background:var(--bg-elev-2);}
.pw-field input::placeholder,.plain-input::placeholder{color:var(--text-faint);}
.pw-field .toggle-eye{position:absolute;left:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-faint);font-size:17px;padding:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.recovery-section{display:flex;flex-direction:column;gap:12px;padding-top:4px;}
.recovery-divider{display:flex;align-items:center;gap:10px;font-size:11px;color:var(--text-faint);margin:4px 0 -2px;}
.recovery-divider::before,.recovery-divider::after{content:"";flex:1;height:1px;background:var(--border-soft);}
.recovery-note{font-size:11px;color:var(--text-faint);margin:-2px 0 0;line-height:1.7;text-align:right;padding:0 2px;}
.btn-primary{width:100%;background:linear-gradient(155deg,#e3b766,var(--accent));color:#241c0d;border:none;border-radius:var(--radius-sm);padding:14px;font-size:15px;font-weight:700;cursor:pointer;margin-top:2px;transition:opacity .15s,transform .1s;letter-spacing:.2px;box-shadow:0 4px 14px rgba(216,166,78,0.18);}
.btn-primary:active{opacity:.9;transform:scale(.99);}
.lock-error{color:var(--danger);font-size:13px;min-height:18px;margin-top:2px;}
.lock-hint{font-size:11px;color:var(--text-faint);margin:16px auto 0;line-height:1.7;max-width:300px;display:flex;align-items:flex-start;gap:6px;text-align:right;}
.lock-hint .ticon{font-size:13px;flex:0 0 auto;margin-top:1px;}
.lock-links{display:flex;flex-direction:column;align-items:center;gap:2px;margin-top:14px;padding-top:14px;border-top:1px solid var(--border-soft);width:100%;max-width:320px;}
.switch-link{background:none;border:none;color:var(--accent-dim);font-size:13px;cursor:pointer;padding:7px 10px;display:flex;align-items:center;gap:6px;border-radius:8px;transition:background .15s,color .15s;}
.switch-link .ticon{font-size:14px;}
.switch-link:active{background:var(--bg-elev);color:var(--accent);}
#app-screen{padding-top:0;}
.topbar{position:sticky;top:0;z-index:5;background:rgba(20,23,28,.96);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);padding:14px 18px 11px;border-bottom:1px solid var(--border-soft);}
.topbar-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px;}
.topbar-brand{display:flex;align-items:center;gap:9px;}
.topbar-logo{width:30px;height:30px;border-radius:8px;background:linear-gradient(155deg,var(--bg-elev-2),var(--bg-elev));border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--accent);}
.topbar-title{font-family:var(--serif);font-size:19px;font-weight:400;letter-spacing:.2px;}
.topbar-actions{display:flex;gap:6px;align-items:center;}
.icon-btn{background:var(--bg-elev);border:1px solid var(--border);color:var(--text-dim);width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;cursor:pointer;transition:background .15s,color .15s;}
.icon-btn:active{background:var(--bg-elev-2);color:var(--text);}
.icon-btn.connected{background:rgba(109,181,138,.12);border-color:rgba(109,181,138,.35);color:var(--good);}
.search-wrap{position:relative;}
.search-wrap .ticon{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--text-faint);font-size:15px;pointer-events:none;}
.search-wrap input{width:100%;background:var(--bg-elev);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 38px 10px 13px;font-size:14px;outline:none;text-align:right;transition:border-color .15s;}
.search-wrap input:focus{border-color:var(--accent-dim);}
.backup-status{display:flex;align-items:center;gap:7px;margin-top:9px;padding:7px 11px;border-radius:var(--radius-sm);font-size:11.5px;cursor:pointer;}
.backup-status .ticon{font-size:13px;flex:0 0 auto;}
.backup-status span{flex:1;}
.backup-status.ok{background:rgba(109,181,138,.1);color:var(--good);}
.backup-status.warn{background:rgba(216,166,78,.1);color:var(--accent);}
.backup-status.danger{background:var(--danger-bg);color:var(--danger);}
.cat-scroll{display:flex;gap:7px;overflow-x:auto;padding:12px 18px 4px;scrollbar-width:none;}
.cat-scroll::-webkit-scrollbar{display:none;}
.cat-chip{flex:0 0 auto;display:flex;align-items:center;gap:5px;background:var(--bg-elev);border:1px solid var(--border);color:var(--text-dim);padding:7px 13px;border-radius:18px;font-size:12.5px;cursor:pointer;white-space:nowrap;transition:background .15s,border-color .15s,color .15s;}
.cat-chip:active{background:var(--bg-elev-2);}
.cat-chip.active{background:var(--accent-bg);border-color:var(--accent-dim);color:var(--accent);}
.entry-list{padding:8px 14px 100px;display:flex;flex-direction:column;gap:8px;}
.empty-state{text-align:center;padding:56px 24px 20px;color:var(--text-faint);}
.empty-state .ticon{font-size:36px;display:block;margin:0 auto 12px;}
.empty-state p{font-size:13.5px;margin:0;line-height:1.8;}
.entry-card{background:var(--bg-elev);border:1px solid var(--border);border-radius:var(--radius);padding:13px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color .15s,background .1s;}
.entry-card:active{background:var(--bg-elev-2);border-color:rgba(255,255,255,.14);}
.entry-icon{width:42px;height:42px;border-radius:11px;flex:0 0 42px;display:flex;align-items:center;justify-content:center;font-size:17px;}
.entry-info{flex:1;min-width:0;}
.entry-name{font-size:14.5px;font-weight:500;margin:0 0 3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.entry-meta{font-size:12px;color:var(--text-dim);margin:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.entry-chevron{color:var(--text-faint);font-size:15px;flex:0 0 auto;}
.ic-purple{background:rgba(127,119,221,.18);color:#a79ff0;}
.ic-teal{background:rgba(29,158,117,.18);color:#52cf9e;}
.ic-coral{background:rgba(216,90,48,.18);color:#ef8a64;}
.ic-blue{background:rgba(55,138,221,.18);color:#7fb2ec;}
.ic-amber{background:rgba(186,117,23,.18);color:#eba43f;}
.ic-gray{background:rgba(136,135,128,.18);color:#b4b2a9;}
.ic-pink{background:rgba(210,100,140,.18);color:#e88ab8;}
.ic-green{background:rgba(60,170,80,.18);color:#6dd87a;}
.cat-c-pink{background:rgba(210,100,140,.16);color:#e88ab8;}
.cat-c-blue{background:rgba(55,138,221,.16);color:#7fb2ec;}
.cat-c-amber{background:rgba(186,117,23,.16);color:#eba43f;}
.cat-c-teal{background:rgba(29,158,117,.16);color:#52cf9e;}
.cat-c-coral{background:rgba(216,90,48,.16);color:#ef8a64;}
.cat-c-gray{background:rgba(136,135,128,.16);color:#b4b2a9;}
.fab{position:fixed;left:18px;bottom:26px;z-index:10;width:56px;height:56px;border-radius:50%;background:linear-gradient(155deg,#e3b766,var(--accent));color:#241c0d;border:none;font-size:22px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 6px 20px rgba(216,166,78,.3);transition:transform .15s,box-shadow .15s;}
.fab:active{transform:scale(.94);box-shadow:0 3px 10px rgba(216,166,78,.2);}
.sheet-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:40;opacity:0;pointer-events:none;transition:opacity .25s;}
.sheet-backdrop.active{opacity:1;pointer-events:all;}
.bottom-sheet{position:fixed;bottom:0;left:0;right:0;z-index:41;background:var(--bg-elev);border-radius:20px 20px 0 0;border-top:1px solid var(--border);padding:0 0 max(20px,env(safe-area-inset-bottom));transform:translateY(100%);transition:transform .3s cubic-bezier(.16,.84,.32,1);box-shadow:0 -8px 32px rgba(0,0,0,.4);}
.bottom-sheet.active{transform:translateY(0);}
.sheet-handle{width:34px;height:4px;border-radius:2px;background:var(--border);margin:12px auto 0;}
.sheet-title{font-size:11px;color:var(--text-faint);font-weight:600;letter-spacing:.8px;text-transform:uppercase;padding:12px 18px 6px;text-align:right;}
.sheet-items{padding:0 10px 6px;}
.sheet-item{width:100%;background:none;border:none;color:var(--text);display:flex;align-items:center;gap:11px;padding:11px 8px;border-radius:11px;cursor:pointer;text-align:right;transition:background .12s;}
.sheet-item:active{background:var(--bg-elev-2);}
.sheet-item-icon{width:36px;height:36px;border-radius:9px;flex:0 0 36px;display:flex;align-items:center;justify-content:center;font-size:16px;}
.sheet-item-icon.accent{background:var(--accent-bg);color:var(--accent);}
.sheet-item-icon.blue{background:rgba(55,138,221,.14);color:#7fb2ec;}
.sheet-item-icon.green{background:rgba(109,181,138,.14);color:var(--good);}
.sheet-item-icon.amber{background:rgba(186,117,23,.14);color:#eba43f;}
.sheet-item-icon.danger{background:var(--danger-bg);color:var(--danger);}
.sheet-item-icon.purple{background:rgba(127,119,221,.14);color:#a79ff0;}
.sheet-item-text{flex:1;display:flex;flex-direction:column;gap:1px;}
.sheet-item-text span{font-size:14px;font-weight:500;}
.sheet-item-text small{font-size:11.5px;color:var(--text-faint);font-weight:400;}
.sheet-item-arrow{color:var(--text-faint);font-size:14px;flex:0 0 auto;}
.sheet-divider{height:1px;background:var(--border-soft);margin:5px 8px;}
.versions-list{display:flex;flex-direction:column;gap:8px;margin-top:8px;}
.version-item{background:var(--bg-elev-2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:border-color .15s;}
.version-item:active{border-color:var(--accent-dim);}
.version-info{text-align:right;}
.version-name{font-size:13.5px;font-weight:500;margin:0 0 2px;}
.version-date{font-size:11.5px;color:var(--text-dim);}
.version-badge{font-size:10.5px;background:var(--accent-bg);color:var(--accent);padding:3px 8px;border-radius:10px;white-space:nowrap;}
.overlay{position:fixed;inset:0;z-index:20;background:var(--bg);overflow-y:auto;display:none;}
.overlay.active{display:block;}
.overlay-header{position:sticky;top:0;background:var(--bg);z-index:2;display:flex;align-items:center;justify-content:space-between;padding:16px 14px;border-bottom:1px solid var(--border-soft);}
.overlay-header-title{font-size:15px;font-weight:600;}
.header-action{background:none;border:none;color:var(--accent);font-size:14px;font-weight:600;cursor:pointer;padding:6px;}
.header-action.danger{color:var(--danger);}
.overlay-body{padding:18px 18px 40px;}
.form-group{margin-bottom:15px;}
.form-label{display:block;font-size:12px;color:var(--text-dim);margin-bottom:6px;font-weight:500;}
.form-input,.form-textarea,.form-select{width:100%;background:var(--bg-elev);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 13px;font-size:14.5px;color:var(--text);outline:none;text-align:right;}
.form-input:focus,.form-textarea:focus,.form-select:focus{border-color:var(--accent-dim);}
.form-textarea{resize:vertical;min-height:70px;font-family:inherit;}
.pw-input-row{position:relative;}
.pw-input-row .form-input{padding-left:72px;}
.pw-input-actions{position:absolute;left:6px;top:50%;transform:translateY(-50%);display:flex;gap:2px;}
.pw-mini-btn{background:none;border:none;color:var(--text-faint);font-size:15px;padding:7px;cursor:pointer;border-radius:6px;}
.pw-mini-btn:active{background:var(--bg-elev-2);}
.icon-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:7px;margin-bottom:8px;}
.icon-pick{aspect-ratio:1;border-radius:10px;background:transparent;border:2px solid transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;padding:2px;transition:border-color .12s;}
.icon-pick-inner{width:100%;height:100%;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;}
.icon-pick.selected{border-color:var(--accent);}
.icon-pick:active .icon-pick-inner{opacity:.75;}
.detail-hero{display:flex;flex-direction:column;align-items:center;padding:8px 0 22px;}
.detail-icon{width:60px;height:60px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:11px;}
.detail-name{font-size:18px;font-weight:600;margin:0 0 4px;}
.detail-cat{font-size:12.5px;color:var(--text-dim);}
.field-card{background:var(--bg-elev);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:9px;overflow:hidden;}
.field-row{display:flex;align-items:center;justify-content:space-between;padding:13px 14px;gap:10px;}
.field-row+.field-row{border-top:1px solid var(--border-soft);}
.field-label{font-size:11px;color:var(--text-faint);margin-bottom:3px;}
.field-value{font-size:14px;word-break:break-all;font-family:monospace;}
.field-value.password-masked{letter-spacing:2px;}
.field-actions{display:flex;gap:3px;flex:0 0 auto;}
.field-icon-btn{background:none;border:none;color:var(--text-faint);font-size:16px;padding:5px;cursor:pointer;border-radius:5px;}
.field-icon-btn:active{background:var(--bg-elev-2);color:var(--text);}
.field-icon-btn.copied{color:var(--good);}
.notes-block{font-size:13.5px;color:var(--text-dim);line-height:1.8;padding:13px 14px;white-space:pre-wrap;}
.strength-bar{height:3px;border-radius:2px;background:var(--bg-elev-2);margin-top:7px;overflow:hidden;}
.strength-fill{height:100%;border-radius:2px;transition:width .2s,background .2s;}
.strength-label{font-size:11px;margin-top:4px;color:var(--text-faint);}
.gen-row{display:flex;align-items:center;gap:9px;background:var(--bg-elev);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 11px;margin-bottom:12px;}
.gen-row input[type=range]{flex:1;}
.gen-toggles{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px;}
.gen-toggle{display:flex;align-items:center;gap:5px;background:var(--bg-elev);border:1px solid var(--border);border-radius:16px;padding:6px 11px;font-size:12px;color:var(--text-dim);cursor:pointer;}
.gen-toggle.on{background:var(--accent-bg);border-color:var(--accent-dim);color:var(--accent);}
.gen-toggle input{display:none;}
.danger-zone{margin-top:22px;padding-top:16px;border-top:1px solid var(--border-soft);}
.btn-danger-outline{width:100%;background:none;border:1px solid rgba(217,104,95,.35);color:var(--danger);border-radius:var(--radius-sm);padding:12px;font-size:13.5px;font-weight:500;cursor:pointer;}
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:30;display:none;align-items:center;justify-content:center;padding:24px;}
.modal-backdrop.active{display:flex;}
.modal-box{background:var(--bg-elev);border:1px solid var(--border);border-radius:16px;padding:22px;max-width:320px;width:100%;text-align:center;max-height:80vh;overflow-y:auto;}
.modal-box p{font-size:13.5px;color:var(--text-dim);line-height:1.7;margin:6px 0 16px;}
.modal-box h3{font-size:15.5px;margin:0;font-weight:600;}
.modal-actions{display:flex;gap:9px;}
.modal-actions button{flex:1;padding:11px;border-radius:9px;font-size:13.5px;border:1px solid var(--border);background:var(--bg-elev-2);cursor:pointer;color:var(--text);}
.modal-actions button.confirm{background:var(--danger);border-color:var(--danger);color:#fff;font-weight:600;}
.modal-actions button.ok{background:var(--accent);border-color:var(--accent);color:#241c0d;font-weight:600;}
.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--bg-elev-2);border:1px solid var(--border);color:var(--text);padding:9px 16px;border-radius:18px;font-size:12.5px;z-index:50;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0;}
@media(prefers-reduced-motion:reduce){*{transition:none !important;animation:none !important;}}
.ticon{display:inline-flex;align-items:center;justify-content:center;line-height:0;}
.ticon-svg{display:block;width:1em;height:1em;color:inherit;}
